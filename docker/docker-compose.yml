version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inkforge
      POSTGRES_PASSWORD: inkforge
      POSTGRES_DB: inkforge
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://inkforge:inkforge@postgres:5432/inkforge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  pgdata:
